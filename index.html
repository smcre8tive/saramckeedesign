<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Key Story Designs</title>
<meta name="description" content="Sara McKee is a digital designer with 10+ years experience, available for freelance, contract, and full-time work.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="icon" type="image/png" href="img/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,600;0,800;1,600;1,800&family=Lexend:wght@300;400&display=swap" rel="stylesheet">
<meta name="theme-color" content="#0f1014">
<style>
/* ── RESET ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── CSS CUSTOM PROPERTIES ── */
:root {
  --gold:          #c8a84b;
  --gold-glow:     #857028;
  --bg:         #0f1014;
  --bg-warm:    #16140a;
  --text:       #FDFDFD;
  --text-muted:    #c8c8c8;
  --nav-bg:        rgba(15,16,20,.92);
  --footer-border: rgba(255,255,255,.1);
  --focus-ring: #c8a84b;
  --nav-h:      5rem;
}

/* ── THEMES ── */
[data-theme="light"] {
  --gold:        #857028;
  --gold-glow:   #6a5820;
  --bg:          #E7E2D0;
  --bg-warm:     #ddd8c4;
  --text:        #0F1014;
  --text-muted:  #4F564A;
  --focus-ring:  #857028;
  --nav-bg:      rgba(231,226,208,.95);
  --footer-border: rgba(15,16,20,.15);
}
[data-theme="forest"] {
  --gold:        #c8a84b;
  --gold-glow:   #857028;
  --bg:          #4F564A;
  --bg-warm:     #424840;
  --text:        #E7E2D0;
  --text-muted:  #c8c4b0;
  --focus-ring:  #c8a84b;
  --nav-bg:      rgba(79,86,74,.95);
  --footer-border: rgba(231,226,208,.15);
}
[data-theme="warm"] {
  --gold:        #857028;
  --gold-glow:   #6a5820;
  --bg:          #FDFDFD;
  --bg-warm:     #f5f0e8;
  --text:        #0F1014;
  --text-muted:  #4F564A;
  --focus-ring:  #857028;
  --nav-bg:      rgba(253,253,253,.97);
  --footer-border: rgba(15,16,20,.1);
}

/* ── SMOOTH THEME TRANSITIONS ── */
html, body, body > nav, footer,
.skip-link, #mobile-menu, .door-card { transition: background-color .35s ease, color .25s ease, border-color .3s ease; }

html { background: var(--bg); }

body {
  font-family: 'Lexend', sans-serif;
  font-weight: 300;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── REDUCE MOTION ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}

/* ── SKIP LINK ── */
.skip-link {
  position: fixed; top: -100%; left: 1rem; z-index: 9999;
  background: var(--bg); color: var(--text);
  padding: .75rem 1.5rem; font-size: 1rem;
  text-decoration: underline;
  border: 2px solid var(--gold);
  border-radius: 4px;
  transition: top .2s ease;
}
.skip-link:focus { top: 1rem; }

/* When skip link target receives programmatic focus, show a ring */
#main-content:focus { outline: none; }
#main-content:focus-visible { outline: 3px solid var(--focus-ring); outline-offset: 4px; border-radius: 3px; }

/* ── GLOBAL FOCUS ── */
:focus-visible {
  outline: 3px solid var(--focus-ring);
  outline-offset: 4px;
  border-radius: 3px;
}

/* ── KEY CURSOR (desktop hover only) ── */
#key-cursor {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  width: 38px; height: 38px;
  transform: translate(-50%, -50%) rotate(-35deg);
  opacity: 0;
  transition: opacity .18s ease;
  display: none;
}
@media (hover: hover) and (pointer: fine) {
  #key-cursor { display: block; }
}
#key-cursor.visible { opacity: 1; }

/* ── NAV ── */
body > nav {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--nav-h);
  z-index: 500;
  padding: 0 3rem;
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(to bottom, var(--nav-bg) 0%, rgba(0,0,0,0) 100%);
}
.nav-logo {
  color: var(--text);
  font-family: 'Spectral', Georgia, serif;
  font-size: .95rem; font-weight: 600;
  text-decoration: none; letter-spacing: .08em; text-transform: uppercase;
  display: flex; align-items: center; gap: .55rem;
  transition: opacity .2s;
  min-height: 44px;
}
.nav-logo:hover { opacity: .75; }
.nav-logo-img { width: 22px; height: 22px; object-fit: contain; display: block; opacity: .9; }

/* Desktop nav links */
.nav-links {
  display: flex; align-items: center; gap: 1.8rem; list-style: none;
}
.nav-links a, .nav-links button {
  color: var(--text); font-size: .75rem; letter-spacing: .2em; text-transform: uppercase;
  text-decoration: none; background: none; border: none; cursor: pointer;
  font-family: 'Lexend', sans-serif; font-weight: 300;
  padding: .5rem 0;
  min-height: 44px; display: inline-flex; align-items: center;
  transition: opacity .2s;
}
.nav-links a:hover, .nav-links button:hover { opacity: .65; }

/* FIX 1: Active nav link — gold underline for current page */
.nav-links a.nav-active {
  color: var(--gold);
  text-decoration: underline;
  text-underline-offset: 4px;
  opacity: 1;
}
.nav-links a.nav-active:hover { opacity: .8; }

.nav-sep { width: 1px; height: 14px; background: var(--text); opacity: .2; }
.nav-social {
  display: inline-flex; align-items: center; justify-content: center;
  width: 44px; height: 44px;
  opacity: .75; transition: opacity .2s;
}
.nav-social:hover { opacity: 1; }
.nav-social svg { width: 18px; height: 18px; fill: var(--text); display: block; }

/* ── MOBILE HAMBURGER ── */
.nav-hamburger {
  display: none;
  flex-direction: column; justify-content: center; align-items: center;
  gap: 5px;
  width: 44px; height: 44px;
  background: none; border: none; cursor: pointer; padding: 0;
  color: var(--text);
}
.nav-hamburger span {
  display: block; width: 22px; height: 1.5px;
  background: #FDFDFD;
  border-radius: 2px;
  transition: transform .3s ease, opacity .2s ease;
}

/* ── MOBILE DRAWER ── */
#mobile-menu {
  display: none;
  position: fixed; inset: 0;
  z-index: 510;
  background: rgba(15,16,20,.97);
  backdrop-filter: blur(12px);
  flex-direction: column;
  justify-content: flex-end;
  align-items: flex-start;
  padding: 0 0 4rem 2rem;
  opacity: 0;
  transition: opacity .3s ease;
}
#mobile-menu.open    { display: flex; }
#mobile-menu.visible { opacity: 1; }

/* Close button */
#mob-close-btn {
  position: absolute;
  top: 5rem; right: 1rem;
  width: 52px; height: 52px;
  display: flex; align-items: center; justify-content: center;
  background: none;
  border: 1.5px solid rgba(255,255,255,.35);
  border-radius: 6px;
  cursor: pointer;
  color: #FDFDFD;
  transition: border-color .2s, opacity .2s;
}
#mob-close-btn:hover { border-color: #FDFDFD; opacity: 1; }
#mob-close-btn svg { width: 18px; height: 18px; stroke: #FDFDFD; fill: none; stroke-width: 2; stroke-linecap: round; }

/* Nav list */
#mobile-menu .mob-nav-list {
  list-style: none;
  display: flex; flex-direction: column;
  align-items: flex-start;
  gap: 0;
  margin-bottom: 2.5rem;
}
#mobile-menu .mob-nav-list li a,
#mobile-menu .mob-nav-list li button {
  color: #FDFDFD;
  font-family: 'Lexend', sans-serif;
  font-size: 1.55rem; letter-spacing: .18em; text-transform: uppercase;
  text-decoration: none; background: none; border: none; cursor: pointer;
  min-height: 52px; display: flex; align-items: center;
  opacity: .9; transition: opacity .2s, color .2s;
  padding: 0;
}
#mobile-menu .mob-nav-list li a:hover,
#mobile-menu .mob-nav-list li button:hover { opacity: 1; color: var(--gold); }

#mobile-menu .mob-nav-list li a.mob-active {
  text-decoration: underline;
  text-underline-offset: 5px;
  opacity: 1;
  color: var(--gold); /* FIX 2: gold tint on active mobile link to match desktop */
}

.mob-socials {
  display: flex; gap: .75rem;
}
.mob-social {
  display: inline-flex; align-items: center; justify-content: center;
  width: 44px; height: 44px; opacity: .6; transition: opacity .2s;
}
.mob-social:hover { opacity: 1; }
.mob-social svg { width: 20px; height: 20px; fill: #FDFDFD; }

/* ── EMAIL FLIP ── */
.email-btn {
  position: relative; height: 44px; display: inline-flex; align-items: center;
}
.email-face-front, .email-face-back {
  display: flex; align-items: center; gap: .3rem; white-space: nowrap;
  transition: opacity .28s, transform .4s cubic-bezier(.76,0,.24,1);
}
.email-face-back { position: absolute; left: 0; opacity: 0; transform: translateY(6px); }
.email-face-back svg { width: 9px; height: 9px; stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
.email-btn:hover .email-face-front,
.email-btn.flipped .email-face-front { opacity: 0; transform: translateY(-6px); }
.email-btn:hover .email-face-back,
.email-btn.flipped .email-face-back  { opacity: 1; transform: none; }

/* ── MAIN ── */
main {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: calc(var(--nav-h) + 2rem) 3rem 4rem;
}

/* ── SITE HERO ── */
.site-hero {
  text-align: center;
  margin-bottom: 3.5rem;
}
.site-title {
  font-family: 'Spectral', Georgia, serif;
  font-size: clamp(3rem, 7vw, 6.5rem);
  font-weight: 800;
  line-height: .9;
  letter-spacing: -.04em;
  color: var(--text);
  margin-bottom: 1.4rem;
}
.site-title em {
  font-style: italic;
  font-weight: 600;
}

/* FIX 3: subtitle promoted outside hero <h1>, styled as sibling */
.doors-label {
  font-size: .75rem; letter-spacing: .32em; text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 0;
  display: flex; align-items: center; gap: .7rem;
}
.doors-label::before, .doors-label::after {
  content: ''; display: block; flex: 1; max-width: 80px; height: 1px;
  background: rgba(255,255,255,.25);
}

/* ── DOOR GRID ── */
.doors-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2.5rem;
  width: 100%; max-width: 1200px;
  list-style: none;
}
.doors-grid > li {
  display: flex;
  flex-direction: column;
}

/* FIX 4: skeleton loader — grid shows shimmer until JS populates cards */
@keyframes shimmer {
  0%   { background-position: -400px 0; }
  100% { background-position:  400px 0; }
}
.doors-grid.loading > li {
  aspect-ratio: 3/5;
}
.doors-grid.loading > li::before {
  content: '';
  display: block;
  width: 100%;
  aspect-ratio: 3/5;
  border-radius: 2px;
  background: linear-gradient(
    90deg,
    rgba(255,255,255,.04) 0%,
    rgba(255,255,255,.08) 40%,
    rgba(255,255,255,.04) 80%
  );
  background-size: 400px 100%;
  animation: shimmer 1.4s ease-in-out infinite;
}
[data-theme="light"]  .doors-grid.loading > li::before,
[data-theme="warm"]   .doors-grid.loading > li::before { background: linear-gradient(90deg, rgba(0,0,0,.04) 0%, rgba(0,0,0,.09) 40%, rgba(0,0,0,.04) 80%); background-size: 400px 100%; }
[data-theme="forest"] .doors-grid.loading > li::before { background: linear-gradient(90deg, rgba(255,255,255,.05) 0%, rgba(255,255,255,.1) 40%, rgba(255,255,255,.05) 80%); background-size: 400px 100%; }

/* ── DOOR CARD ── */
.door-card {
  position: relative;
  display: block;
  text-decoration: none; color: inherit;
  aspect-ratio: 3/5;
  width: 100%;
  user-select: none;
  cursor: pointer;
  filter: drop-shadow(0 8px 28px rgba(0,0,0,.55));
  transition: filter .45s ease, transform .3s ease;
  will-change: filter;
  border-radius: 2px;
}

/* FIX 5: Hover (pointer) and focus-visible are separate — keyboard users see ring without cursor:none */
@media (hover: hover) and (pointer: fine) {
  .door-card:hover {
    filter:
      drop-shadow(0 0 14px rgba(133,112,40,.75))
      drop-shadow(0 0 32px rgba(133,112,40,.4))
      drop-shadow(0 14px 40px rgba(0,0,0,.65));
    cursor: none;
  }
  .door-card:hover .door-panel {
    transform: perspective(480px) rotateY(-72deg);
  }
  .door-card:hover .door-frame-lines {
    filter: drop-shadow(0 0 4px rgba(200,168,75,.9)) drop-shadow(0 0 10px rgba(133,112,40,.55));
  }
  /* Only hide cursor when actually hovering — never on focus */
  .door-card:hover { cursor: none; }
  .door-card:hover + .door-label .door-label-title { color: var(--gold); }
}

/* Keyboard focus: door opens + visible ring, no cursor:none interference */
.door-card:focus-visible {
  outline: 3px solid var(--focus-ring);
  outline-offset: 5px;
  border-radius: 4px;
}
.door-card:focus-visible .door-panel {
  transform: perspective(480px) rotateY(-72deg);
}
.door-card:focus-visible .door-frame-lines {
  filter: drop-shadow(0 0 6px rgba(200,168,75,1));
}
/* Also light up the label on keyboard focus */
.door-card:focus-visible + .door-label .door-label-title { color: var(--gold); }

/* ── DOOR CARD INNER ── */
.door-card-inner {
  position: absolute; inset: 0;
}

.door-svg-wrap {
  position: absolute; inset: 0; z-index: 1;
}
.door-svg-wrap svg { width: 100%; height: 100%; overflow: hidden; }

/* Door panel swing */
.door-panel {
  transform-origin: left center;
  transform-box: fill-box;
  transition: transform .78s cubic-bezier(.76,0,.24,1);
}

.door-frame-lines { transition: filter .45s ease; }

/* ── DOOR LABEL ── */
.door-label {
  display: block;
  text-align: center;
  padding-top: .75rem;
}
.door-label-num {
  font-family: 'Spectral', Georgia, serif; font-style: italic;
  font-size: .72rem;
  color: var(--text-muted);
  display: block; margin-bottom: .2rem;
}
.door-label-title {
  font-size: .65rem; letter-spacing: .18em; text-transform: uppercase;
  color: var(--text-muted);
  display: block;
  transition: color .2s;
}

/* ── FOOTER ── */
footer {
  border-top: 1px solid var(--footer-border);
  padding: 2.5rem 3rem;
  margin-top: 2rem;
  width: 100%;
  /* FIX 6: footer flex row for potential future links + copyright */
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 1rem;
}
.footer-name {
  font-family: 'Spectral', Georgia, serif; font-size: .88rem;
  font-weight: 600; font-style: italic;
  color: var(--text-muted);
  letter-spacing: .04em;
}
/* FIX 7: "Back to top" link in footer — keyboard & touch accessible */
.footer-top-link {
  font-size: .7rem; letter-spacing: .18em; text-transform: uppercase;
  color: var(--text-muted);
  text-decoration: none;
  display: inline-flex; align-items: center; gap: .4rem;
  opacity: .7;
  transition: opacity .2s, color .2s;
  min-height: 44px;
}
.footer-top-link:hover { opacity: 1; color: var(--gold); }
.footer-top-link svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; }


/* ══════════════════════════════════════════════════════
   RESPONSIVE BREAKPOINTS
══════════════════════════════════════════════════════ */

@media (max-width: 1280px) {
  .doors-grid { max-width: 960px; gap: 2rem; }
}

@media (max-width: 1050px) {
  .doors-grid { grid-template-columns: repeat(2, 1fr); gap: 2rem; max-width: 680px; }
  main { padding: calc(var(--nav-h) + 1.5rem) 2rem 4rem; }
}

@media (max-width: 768px) {
  nav { padding: 0 1.5rem; }
  .nav-links { display: none; }
  .nav-hamburger { display: flex; }
  main { padding: calc(var(--nav-h) + 1rem) 1.5rem 4rem; }
  .site-hero { margin-bottom: 2.5rem; }
  .doors-grid { gap: 1.8rem; max-width: 560px; }
  footer { padding: 2rem 1.5rem; }
}

@media (max-width: 560px) {
  :root { --nav-h: 4rem; }
  .doors-grid {
    grid-template-columns: repeat(2, 1fr);
    gap: 1.2rem;
    max-width: 100%;
  }
  .door-label { padding-top: .6rem; }
  .door-label-num   { font-size: .62rem; }
  .door-label-title { font-size: .56rem; letter-spacing: .12em; }
  main { padding: calc(var(--nav-h) + .75rem) 1rem 3rem; }
  .site-hero { margin-bottom: 2rem; }
  .doors-label { font-size: .65rem; letter-spacing: .22em; }
  footer { padding: 1.5rem 1rem; }
  .footer-name { font-size: .78rem; }
}

@media (max-width: 360px) {
  .doors-grid { gap: .75rem; }
  main { padding-left: .75rem; padding-right: .75rem; }
}

/* ── THEME SWITCHER WIDGET ── */
#theme-switcher {
  position: fixed;
  top: calc(var(--nav-h) + .6rem);
  right: 1.2rem;
  z-index: 505;
  font-family: 'Lexend', sans-serif;
}

/* FIX 8: theme switcher nudges up on small screens so it doesn't crowd content */
@media (max-width: 560px) {
  #theme-switcher {
    top: calc(var(--nav-h) - 2.6rem);
    right: .75rem;
  }
}

#theme-toggle-btn {
  display: flex; align-items: center; gap: .45rem;
  height: 36px; padding: 0 .75rem 0 .6rem;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.18);
  border-radius: 40px;
  color: var(--text);
  cursor: pointer;
  backdrop-filter: blur(10px);
  transition: background .2s, border-color .2s, box-shadow .2s;
}
[data-theme="light"] #theme-toggle-btn,
[data-theme="warm"]  #theme-toggle-btn {
  background: rgba(0,0,0,.07);
  border-color: rgba(0,0,0,.18);
}
#theme-toggle-btn:hover {
  background: rgba(200,168,75,.15);
  border-color: var(--gold);
  box-shadow: 0 0 12px rgba(200,168,75,.25);
}
#theme-toggle-btn:focus-visible {
  outline: 2px solid var(--focus-ring);
  outline-offset: 3px;
}
#theme-current-icon { display:flex; align-items:center; }
#theme-current-icon svg { width: 15px; height: 15px; display: block; }
.theme-chevron { width: 9px; height: 6px; opacity: .6; transition: transform .25s; }
#theme-toggle-btn[aria-expanded="true"] .theme-chevron { transform: rotate(180deg); }
#theme-panel {
  position: absolute;
  top: calc(100% + .55rem);
  right: 0;
  min-width: 162px;
  background: var(--bg);
  border: 1px solid rgba(200,168,75,.3);
  border-radius: 12px;
  padding: .6rem .5rem .5rem;
  box-shadow: 0 8px 32px rgba(0,0,0,.45), 0 0 0 1px rgba(200,168,75,.08);
  animation: theme-panel-in .18s cubic-bezier(.22,1,.36,1) both;
}
@keyframes theme-panel-in {
  from { opacity: 0; transform: translateY(-6px) scale(.97); }
  to   { opacity: 1; transform: none; }
}
.theme-panel-label {
  font-size: .6rem; letter-spacing: .22em; text-transform: uppercase;
  color: var(--text-muted); padding: 0 .5rem .45rem;
  border-bottom: 1px solid rgba(200,168,75,.15);
  margin-bottom: .35rem;
}
#theme-list { list-style: none; display: flex; flex-direction: column; gap: 2px; }
#theme-list button {
  width: 100%; display: flex; align-items: center; gap: .6rem;
  padding: .5rem .6rem;
  border: none; background: none; cursor: pointer;
  color: var(--text); border-radius: 8px;
  font-family: 'Lexend', sans-serif; font-size: .72rem;
  letter-spacing: .08em; text-transform: uppercase;
  transition: background .15s, color .15s;
  text-align: left;
}
#theme-list button:hover { background: rgba(200,168,75,.12); color: var(--gold); }
#theme-list button.ts-active { background: rgba(200,168,75,.18); color: var(--gold); }
#theme-list button:focus-visible { outline: 2px solid var(--focus-ring); outline-offset: 2px; }
.theme-btn-icon { width: 18px; height: 18px; display: flex; align-items: center; flex-shrink: 0; }
.theme-btn-icon svg { width: 18px; height: 18px; }
.theme-btn-label { flex: 1; }
#theme-list button.ts-active .theme-btn-label::after { content: ' ✓'; font-size: .65rem; opacity: .7; }
</style>
</head>
<body>

<svg id="key-cursor" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg"
     aria-hidden="true" focusable="false">
  <circle cx="12" cy="12" r="8"   stroke="#c8a84b" stroke-width="2.2"/>
  <circle cx="12" cy="12" r="3.8" stroke="#c8a84b" stroke-width="1.4"/>
  <line x1="18.5" y1="18.5" x2="33"   y2="33"   stroke="#c8a84b" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="26"   y1="26"   x2="29.5" y2="22.5"  stroke="#c8a84b" stroke-width="2"   stroke-linecap="round"/>
  <line x1="29.5" y1="29.5" x2="33"   y2="26"    stroke="#c8a84b" stroke-width="2"   stroke-linecap="round"/>
</svg>

  const isCurrentHome = currentPath === '/' || currentPath.endsWith('index.html') || currentPath.endsWith('/');

  }, { passive: true });

  document.querySelectorAll('.door-card').forEach(card => {
    card.addEventListener('mouseenter', () => {
      keyCursor.classList.add('visible');
      document.body.style.cursor = 'none';

    card.addEventListener('mouseleave', () => {
      keyCursor.classList.remove('visible');
      document.body.style.cursor = '';
    });
  });
}

/* ── EMAIL COPY ── */
const EMAIL = 'hello@saramckeedesign.com';

function setupEmailCopy(btnId, statusId, frontSelector, backSelector) {
  const btn = document.getElementById(btnId);
  const statusEl = document.getElementById(statusId);
  if (!btn) return;
  let copied = false, timer;
  const front = frontSelector ? btn.querySelector(frontSelector) : null;
  const back  = backSelector  ? btn.querySelector(backSelector)  : null;

  function doCopy() {
    if (copied) return;
    copied = true;
    btn.classList.add('flipped');
    if (back)  back.removeAttribute('aria-hidden');
    if (front) front.setAttribute('aria-hidden', 'true');
    navigator.clipboard.writeText(EMAIL).catch(() => {});
    // FIX 10: announce to screen readers via dedicated live region
    if (statusEl) statusEl.textContent = 'Email address copied to clipboard.';
    clearTimeout(timer);
    timer = setTimeout(() => {
      btn.classList.remove('flipped');
      copied = false;
      if (back)  back.setAttribute('aria-hidden', 'true');
      if (front) front.removeAttribute('aria-hidden');
      if (statusEl) statusEl.textContent = '';
    }, 2600);
  }

  btn.addEventListener('click', doCopy);
  btn.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); doCopy(); }
  });
}

/* ── MOBILE HAMBURGER ── */
const hamburger = document.getElementById('hamburger-btn');
const mobileMenu = document.getElementById('mobile-menu');
const mobCloseBtn = document.getElementById('mob-close-btn');

if (hamburger && mobileMenu) {
  const getFocusable = () => [
    ...mobileMenu.querySelectorAll('a, button')
  ].filter(el => !el.disabled);

  function openMenu() {
    mobileMenu.classList.add('open');
    requestAnimationFrame(() => requestAnimationFrame(() => mobileMenu.classList.add('visible')));
    hamburger.setAttribute('aria-expanded', 'true');
    document.body.style.overflow = 'hidden';
    if (mobCloseBtn) setTimeout(() => mobCloseBtn.focus(), 50);
  }

  function closeMenu() {
    mobileMenu.classList.remove('visible');
    setTimeout(() => mobileMenu.classList.remove('open'), 300);
    hamburger.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
    hamburger.focus();
  }

  hamburger.addEventListener('click', openMenu);
  if (mobCloseBtn) mobCloseBtn.addEventListener('click', closeMenu);

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && mobileMenu.classList.contains('open')) closeMenu();
  });

  mobileMenu.addEventListener('keydown', e => {
    if (e.key !== 'Tab') return;
    const focusable = getFocusable();
    const first = focusable[0];
    const last  = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault(); last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault(); first.focus();
    }
  });

  mobileMenu.addEventListener('click', e => {
    if (e.target === mobileMenu) closeMenu();
  });
}

  li.appendChild(btn);
  list.appendChild(li);
});

function applyTheme(id,save){
  if(save===undefined) save=true;
  document.documentElement.setAttribute('data-theme',id);
  if(save) try{localStorage.setItem(KEY,id);}catch(e){}
  var t=THEMES.find(function(x){return x.id===id;})||THEMES[0];
  currentIcon.innerHTML=t.icon;
  list.querySelectorAll('button').forEach(function(b){
    var on=b.getAttribute('data-theme-id')===id;
    b.setAttribute('aria-checked',on?'true':'false');
    b.classList.toggle('ts-active',on);
  });
}

var saved; try{saved=localStorage.getItem(KEY);}catch(e){}
if(saved&&THEMES.find(function(t){return t.id===saved;})) applyTheme(saved,false);
else if(window.matchMedia&&window.matchMedia('(prefers-color-scheme: light)').matches) applyTheme('light',false);
else applyTheme('dark',false);

function openPanel(){
  panel.hidden=false;
  toggleBtn.setAttribute('aria-expanded','true');
  var first=list.querySelector('button');
  if(first) setTimeout(function(){first.focus();},10);
}
function closePanel(ret){
  panel.hidden=true;
  toggleBtn.setAttribute('aria-expanded','false');
  if(ret!==false) toggleBtn.focus();
}
toggleBtn.addEventListener('click',function(){panel.hidden?openPanel():closePanel();});
document.addEventListener('pointerdown',function(e){
  if(!document.getElementById('theme-switcher').contains(e.target)) closePanel(false);
});
panel.addEventListener('keydown',function(e){
  var items=[].slice.call(list.querySelectorAll('button'));
  var idx=items.indexOf(document.activeElement);
  if(e.key==='ArrowDown'){e.preventDefault();items[(idx+1)%items.length].focus();}
  else if(e.key==='ArrowUp'){e.preventDefault();items[(idx-1+items.length)%items.length].focus();}
  else if(e.key==='Escape'||e.key==='Tab'){closePanel();}
});
})();
</script>

</body>
</html>
